<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WSC Entries" />
  <meta name="theme-color" content="#0a1628" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>WSC New Entries</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@300;400;600;700&family=Barlow:wght@300;400;500&display=swap');
    :root {
      --navy:#0a1628;--navy2:#0f2040;--navy3:#1a3560;
      --teal:#00b4cc;--teal2:#00d4f0;--gold:#e8a020;
      --red:#e03030;--green:#20c060;--white:#f0f4f8;--grey:#8aa0b8;--radius:12px;
    }
    *{box-sizing:border-box;margin:0;padding:0;}
    html,body{height:100%;background:var(--navy);color:var(--white);font-family:'Barlow',sans-serif;font-weight:300;-webkit-font-smoothing:antialiased;overscroll-behavior:none;}
    body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 80% 50% at 20% 80%,rgba(0,180,204,0.08) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 20%,rgba(10,40,80,0.6) 0%,transparent 70%);pointer-events:none;z-index:0;}
    .app{position:relative;z-index:1;min-height:100dvh;display:flex;flex-direction:column;padding:env(safe-area-inset-top,20px) 20px env(safe-area-inset-bottom,20px);max-width:520px;margin:0 auto;}

    header{display:flex;align-items:flex-start;justify-content:space-between;padding:24px 0 16px;}
    .logo-block h1{font-family:'Barlow Condensed',sans-serif;font-size:28px;font-weight:700;letter-spacing:0.04em;text-transform:uppercase;line-height:1;color:var(--white);}
    .logo-block h1 span{color:var(--teal);}
    .logo-block p{font-size:11px;color:var(--grey);letter-spacing:0.12em;text-transform:uppercase;margin-top:4px;}
    .header-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;}
    .version{font-family:'Barlow Condensed',sans-serif;font-size:15px;font-weight:600;color:var(--teal);letter-spacing:0.1em;background:rgba(0,180,204,0.12);border:1px solid rgba(0,180,204,0.3);border-radius:6px;padding:3px 8px;}
    .status-dot{width:10px;height:10px;border-radius:50%;background:var(--grey);transition:background 0.3s;align-self:flex-end;}
    .status-dot.active{background:var(--green);box-shadow:0 0 8px var(--green);}
    .status-dot.pending{background:var(--gold);box-shadow:0 0 8px var(--gold);animation:pulse 1.5s infinite;}
    .status-dot.error{background:var(--red);box-shadow:0 0 8px var(--red);}
    @keyframes pulse{0%,100%{opacity:1;}50%{opacity:0.4;}}

    /* Auth */
    #auth-screen{flex:1;display:flex;flex-direction:column;justify-content:center;gap:16px;}
    .auth-title{font-family:'Barlow Condensed',sans-serif;font-size:22px;font-weight:600;color:var(--grey);letter-spacing:0.06em;text-transform:uppercase;margin-bottom:8px;}
    .field{display:flex;flex-direction:column;gap:6px;}
    .field label{font-size:11px;letter-spacing:0.1em;text-transform:uppercase;color:var(--grey);}
    .field input{background:var(--navy2);border:1px solid var(--navy3);border-radius:var(--radius);color:var(--white);font-family:'Barlow',sans-serif;font-size:16px;padding:14px 16px;outline:none;transition:border-color 0.2s;}
    .field input:focus{border-color:var(--teal);}
    .auth-error{font-size:12px;color:var(--red);text-align:center;min-height:16px;}

    /* Buttons */
    .btn{display:flex;align-items:center;justify-content:center;gap:10px;border:none;border-radius:var(--radius);font-family:'Barlow Condensed',sans-serif;font-size:18px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:16px 24px;cursor:pointer;transition:opacity 0.15s,transform 0.1s;width:100%;}
    .btn:active{transform:scale(0.97);opacity:0.85;}
    .btn:disabled{opacity:0.35;cursor:not-allowed;transform:none;}
    .btn-primary{background:var(--teal);color:var(--navy);}
    .btn-import{background:var(--gold);color:var(--navy);font-size:18px;padding:16px 24px;}
    .btn-detect{background:var(--teal);color:var(--navy);font-size:16px;padding:14px 24px;}
    .btn-secondary{background:transparent;border:1px solid var(--navy3);color:var(--grey);font-size:14px;padding:12px 24px;}

    /* Main */
    #main-screen{flex:1;display:flex;flex-direction:column;gap:14px;}
    .summary-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}
    .card{background:var(--navy2);border:1px solid var(--navy3);border-radius:var(--radius);padding:14px 10px;text-align:center;}
    .card .count{font-family:'Barlow Condensed',sans-serif;font-size:34px;font-weight:700;line-height:1;}
    .card .label{font-size:10px;letter-spacing:0.1em;text-transform:uppercase;color:var(--grey);margin-top:4px;}
    .card.new .count{color:var(--teal2);}
    .card.updates .count{color:var(--gold);}
    .card.dupes .count{color:var(--red);}

    /* Info row */
    .info-row{display:flex;align-items:center;justify-content:space-between;gap:8px;min-height:22px;}
    .timestamp{font-size:11px;color:var(--grey);letter-spacing:0.04em;flex-shrink:0;}
    .progress-text{font-size:11px;color:var(--teal);letter-spacing:0.04em;text-align:right;flex:1;transition:opacity 0.3s;}
    .progress-text.fade{opacity:0;}

    /* Complete badge */
    .complete-badge{display:inline-flex;align-items:center;gap:5px;background:rgba(32,192,96,0.15);color:var(--green);border:1px solid rgba(32,192,96,0.4);border-radius:20px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:3px 10px;opacity:1;transition:opacity 1s;}
    .complete-badge.fade{opacity:0;}

    .action-row{display:flex;flex-direction:column;gap:8px;}
    .banner{background:rgba(0,180,204,0.1);border:1px solid rgba(0,180,204,0.25);border-radius:var(--radius);padding:12px 14px;font-size:13px;color:var(--teal2);display:flex;align-items:center;gap:10px;}
    .banner button{margin-left:auto;background:var(--teal);color:var(--navy);border:none;border-radius:6px;font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.06em;text-transform:uppercase;padding:6px 12px;cursor:pointer;white-space:nowrap;}
    .section-title{font-family:'Barlow Condensed',sans-serif;font-size:13px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--grey);padding-bottom:8px;border-bottom:1px solid var(--navy3);}
    .boat-list{display:flex;flex-direction:column;gap:8px;}
    .boat-item{background:var(--navy2);border:1px solid var(--navy3);border-left:3px solid var(--teal);border-radius:var(--radius);padding:12px 14px;}
    .boat-item.duplicate{border-left-color:var(--red);}
    .boat-helm{font-size:15px;font-weight:500;color:var(--white);}
    .boat-detail{font-size:12px;color:var(--grey);margin-top:3px;}
    .dupe-badge{display:inline-block;background:rgba(224,48,48,0.15);color:var(--red);border:1px solid rgba(224,48,48,0.3);border-radius:4px;font-size:10px;font-weight:600;letter-spacing:0.08em;text-transform:uppercase;padding:2px 6px;margin-bottom:4px;}
    .dupe-detail{font-size:11px;color:var(--grey);margin-top:4px;}
    .state-panel{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:12px;text-align:center;padding:40px 20px;}
    .state-sub{font-size:13px;color:var(--grey);max-width:260px;line-height:1.5;}
    .spinner{width:28px;height:28px;border:3px solid var(--navy3);border-top-color:var(--teal);border-radius:50%;animation:spin 0.8s linear infinite;display:inline-block;}
    @keyframes spin{to{transform:rotate(360deg);}}
    .empty-notice{text-align:center;padding:20px;color:var(--grey);font-size:13px;}
    .empty-icon{font-size:36px;margin-bottom:8px;}
    .section-gap{display:flex;flex-direction:column;gap:10px;}
    .hidden{display:none !important;}
  </style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo-block">
      <h1>WSC <span>Entries</span></h1>
      <p>Warsash Sailing Club</p>
    </div>
    <div class="header-right">
      <span class="version">v1.1</span>
      <div class="status-dot" id="status-dot"></div>
    </div>
  </header>

  <!-- Auth screen -->
  <div id="auth-screen" class="hidden">
    <p class="auth-title">Access</p>
    <div class="field">
      <label>Password</label>
      <input type="password" id="pin-input" placeholder="Enter password" autocomplete="current-password" />
    </div>
    <p class="auth-error" id="auth-error"></p>
    <button class="btn btn-primary" id="pin-btn">Unlock</button>
  </div>

  <!-- Main screen -->
  <div id="main-screen" class="hidden">
    <div class="banner hidden" id="notif-banner">
      <span>🔔</span>
      <span>Enable notifications for new entry alerts</span>
      <button id="notif-btn">Enable</button>
    </div>

    <div class="state-panel" id="loading-state">
      <div class="spinner"></div>
      <p class="state-sub">Loading…</p>
    </div>

    <div id="report-panel" class="hidden" style="display:flex;flex-direction:column;gap:14px;flex:1">
      <div class="summary-row">
        <div class="card new"><div class="count" id="count-new">0</div><div class="label">New Entries</div></div>
        <div class="card updates"><div class="count" id="count-updates">0</div><div class="label">To Review</div></div>
        <div class="card dupes"><div class="count" id="count-dupes">0</div><div class="label">Duplicates</div></div>
      </div>

      <div class="info-row">
        <span class="timestamp" id="report-time">–</span>
        <span class="progress-text fade" id="progress-text"></span>
      </div>

      <div class="action-row">
        <button class="btn btn-detect" id="detect-btn">🔍 Detect New Entries</button>
        <button class="btn btn-import" id="import-btn">⚓ Import New Entries</button>
        <button class="btn btn-secondary" id="refresh-btn">↻ Refresh</button>
      </div>

      <div id="new-boats-section" class="section-gap">
        <p class="section-title">New Entries</p>
        <div class="boat-list" id="new-boats-list">
          <div class="empty-notice"><div class="empty-icon">⛵</div>No new entries pending</div>
        </div>
      </div>

      <div id="dupes-section" class="hidden section-gap">
        <p class="section-title">⚠️ Possible Duplicates</p>
        <div class="boat-list" id="dupes-list"></div>
      </div>

      <div id="updates-section" class="hidden section-gap">
        <p class="section-title">Update Existing (set to Ignore)</p>
        <div class="boat-list" id="updates-note"></div>
      </div>
    </div>
  </div>
</div>

<script>
  const CF_WORKER_URL    = 'https://wsc-import.kieronholt.workers.dev';
  const VAPID_PUBLIC_KEY = 'BCxRL38H8yvsUwN2IlLKFa2g3x0N83jnc4OFkMyNW6b9Bn2W8k7N97gVD8UBfc55mC1o2v5DP58k_lvKNmwvYRs';
  const GITHUB_ORG       = 'kieronholt-prog';
  const GITHUB_REPO      = 'wsc-halsail-import';
  const getGithubToken   = () => localStorage.getItem('wsc_github_token') || '';
  const $                = (id) => document.getElementById(id);
  const AUTH_KEY         = 'wsc_auth_hash';

  // ---- Password auth (hashed, works across any device) ----
  async function hashValue(val) {
    const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(val));
    return Array.from(new Uint8Array(buf)).map(b => b.toString(16).padStart(2,'0')).join('');
  }

  async function checkAuth() {
    const stored = localStorage.getItem(AUTH_KEY);
    if (!stored) {
      // First run — set password
      const pw = prompt('Set an access password for this app:');
      if (!pw || pw.length < 4) { checkAuth(); return; }
      localStorage.setItem(AUTH_KEY, await hashValue(pw));
      if (!localStorage.getItem('wsc_github_token')) {
        const token = prompt('Enter your GitHub PAT token:');
        if (token) localStorage.setItem('wsc_github_token', token);
      }
      // Store password hash in worker for cross-device verification
      await registerPassword(pw);
      showMain();
    } else {
      $('auth-screen').classList.remove('hidden');
    }
  }

  async function registerPassword(pw) {
    const hash = await hashValue(pw + 'wsc-salt-2026');
    try {
      await fetch(`${CF_WORKER_URL}/auth-register`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hash }),
      });
    } catch {}
  }

  $('pin-btn').addEventListener('click', async () => {
    const pw = $('pin-input').value;
    if (!pw) return;
    const hash = await hashValue(pw + 'wsc-salt-2026');

    // Verify against worker
    try {
      const res = await fetch(`${CF_WORKER_URL}/auth-verify`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ hash }),
      });
      const data = await res.json();
      if (data.ok) {
        // Store locally and proceed
        localStorage.setItem(AUTH_KEY, await hashValue(pw));
        localStorage.setItem('wsc_auth_token', hash);
        if (!localStorage.getItem('wsc_github_token')) {
          const token = prompt('Enter your GitHub PAT token:');
          if (token) localStorage.setItem('wsc_github_token', token);
        }
        $('auth-screen').classList.add('hidden');
        $('auth-error').textContent = '';
        showMain();
      } else {
        $('auth-error').textContent = 'Incorrect password';
        $('pin-input').value = '';
      }
    } catch {
      $('auth-error').textContent = 'Could not connect. Check your internet.';
    }
  });

  $('pin-input').addEventListener('keydown', (e) => { if (e.key === 'Enter') $('pin-btn').click(); });

  // Auth token for API calls (password hash replaces pwa_token)
  function getAuthToken() {
    return localStorage.getItem('wsc_auth_token') || '';
  }

  // ---- Service Worker + Push ----
  let swRegistration = null;

  async function initSW() {
    if (!('serviceWorker' in navigator)) return;
    swRegistration = await navigator.serviceWorker.register('/wsc-halsail-pwa/sw.js');
    checkNotifPermission();
  }

  function checkNotifPermission() {
    if (!('Notification' in window)) return;
    if (Notification.permission === 'default') $('notif-banner').classList.remove('hidden');
    else if (Notification.permission === 'granted') subscribePush();
  }

  $('notif-btn').addEventListener('click', async () => {
    const perm = await Notification.requestPermission();
    if (perm === 'granted') { $('notif-banner').classList.add('hidden'); await subscribePush(); }
  });

  async function subscribePush() {
    if (!swRegistration) return;
    try {
      const sub = await swRegistration.pushManager.subscribe({
        userVisibleOnly: true,
        applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY),
      });
      await fetch(`${CF_WORKER_URL}/subscribe`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'X-Auth-Token': getAuthToken() },
        body: JSON.stringify(sub),
      });
      setDot('active');
    } catch (err) { console.error('Push failed:', err); }
  }

  function urlBase64ToUint8Array(b) {
    const p = '='.repeat((4-(b.length%4))%4);
    const s = (b+p).replace(/-/g,'+').replace(/_/g,'/');
    return Uint8Array.from([...atob(s)].map(c=>c.charCodeAt(0)));
  }

  function setDot(state) {
    const dot = $('status-dot');
    dot.className = 'status-dot';
    if (state) dot.classList.add(state);
  }

  function setProgress(text) {
    const el = $('progress-text');
    if (text) { el.textContent = text; el.classList.remove('fade'); }
    else { el.classList.add('fade'); setTimeout(() => { el.textContent = ''; }, 300); }
  }

  function showCompleteBadge() {
    const el = $('progress-text');
    el.innerHTML = '<span class="complete-badge">✓ Complete</span>';
    el.classList.remove('fade');
    setTimeout(() => {
      const badge = el.querySelector('.complete-badge');
      if (badge) badge.classList.add('fade');
      setTimeout(() => { el.textContent = ''; el.classList.add('fade'); }, 1000);
    }, 2000);
  }

  function showMain() {
    $('main-screen').classList.remove('hidden');
    initSW();
    loadReport();
  }

  async function loadReport() {
    $('loading-state').classList.remove('hidden');
    $('report-panel').classList.add('hidden');
    setDot('pending');
    try {
      const res = await fetch(`${CF_WORKER_URL}/report`, {
        headers: { 'X-Auth-Token': getAuthToken() },
      });
      if (!res.ok) throw new Error(`${res.status}`);
      const data = await res.json();
      renderReport(data.empty ? null : data);
    } catch (err) {
      console.error('loadReport error:', err);
      renderReport(null);
    }
    $('loading-state').classList.add('hidden');
    $('report-panel').classList.remove('hidden');
  }

  function renderReport(data) {
    const addNew     = data?.addNew ?? 0;
    const updateEx   = data?.updateExisting ?? 0;
    const dupesCount = data?.duplicatesCount ?? 0;

    $('count-new').textContent     = addNew;
    $('count-updates').textContent = updateEx;
    $('count-dupes').textContent   = dupesCount;

    if (data?.timestamp) {
      const d = new Date(data.timestamp);
      $('report-time').textContent = `Detected ${d.toLocaleDateString('en-GB',{weekday:'short',day:'numeric',month:'short'})} at ${d.toLocaleTimeString('en-GB',{hour:'2-digit',minute:'2-digit'})}`;
    } else {
      $('report-time').textContent = 'No pending entries';
    }

    const newList = $('new-boats-list');
    newList.innerHTML = '';
    if (addNew > 0 && data?.newBoats?.length) {
      data.newBoats.forEach(b => {
        const el = document.createElement('div');
        el.className = 'boat-item';
        el.innerHTML = `<div class="boat-helm">${esc(b.helm)}</div><div class="boat-detail">${esc(b.className)} · ${esc(b.sailNo)}${b.crew ? ' · Crew: ' + esc(b.crew) : ''}</div>`;
        newList.appendChild(el);
      });
    } else {
      newList.innerHTML = '<div class="empty-notice"><div class="empty-icon">⛵</div>No new entries pending</div>';
    }

    const dupesSection = $('dupes-section');
    const dupesList = $('dupes-list');
    dupesList.innerHTML = '';
    if (dupesCount > 0 && data?.duplicates?.length) {
      dupesSection.classList.remove('hidden');
      data.duplicates.forEach(d => {
        const el = document.createElement('div');
        el.className = 'boat-item duplicate';
        el.innerHTML = `<div class="dupe-badge">Possible Duplicate</div><div class="boat-helm">${esc(d.helm)} · ${esc(d.className)}</div><div class="dupe-detail">Existing: Sail ${esc(d.existing.sailNo)}${d.existing.crew?' / '+esc(d.existing.crew):''}<br>Incoming: Sail ${esc(d.incoming.sailNo)}${d.incoming.crew?' / '+esc(d.incoming.crew):''}</div>`;
        dupesList.appendChild(el);
      });
    } else { dupesSection.classList.add('hidden'); }

    const updatesSection = $('updates-section');
    if (updateEx > 0) {
      updatesSection.classList.remove('hidden');
      $('updates-note').innerHTML = `<div class="boat-item" style="border-left-color:var(--gold)"><div class="boat-detail" style="color:var(--gold)">${updateEx} boat${updateEx!==1?'s':''} with updated details set to <strong>Ignore</strong>. Review in Halsail.</div></div>`;
    } else { updatesSection.classList.add('hidden'); }

    $('import-btn').disabled = addNew === 0;
    setDot(dupesCount > 0 ? 'error' : addNew > 0 ? 'pending' : 'active');
  }

  function esc(str) {
    return (str||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  async function triggerWorkflow(workflowFile, eventType) {
    const token = getGithubToken();
    if (!token) { alert('GitHub token not set. Please reinstall the app.'); return null; }
    let res;
    if (eventType) {
      res = await fetch(`https://api.github.com/repos/${GITHUB_ORG}/${GITHUB_REPO}/dispatches`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify({ event_type: eventType }),
      });
    } else {
      res = await fetch(`https://api.github.com/repos/${GITHUB_ORG}/${GITHUB_REPO}/actions/workflows/${workflowFile}/dispatches`, {
        method: 'POST',
        headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json', 'Content-Type': 'application/json' },
        body: JSON.stringify({ ref: 'main' }),
      });
    }
    if (res.status !== 204) { console.error('Trigger failed:', res.status); return null; }
    await new Promise(r => setTimeout(r, 4000));
    const runsRes = await fetch(
      `https://api.github.com/repos/${GITHUB_ORG}/${GITHUB_REPO}/actions/runs?per_page=5`,
      { headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' } }
    );
    const runsData = await runsRes.json();
    return runsData.workflow_runs?.[0]?.id || null;
  }

  async function pollRunProgress(runId) {
    const token = getGithubToken();
    let attempts = 0;
    const friendly = {
      'Checkout': 'Checking out…',
      'Setup Node.js': 'Setting up Node.js…',
      'Install dependencies': 'Installing dependencies…',
      'Cache Playwright browsers': 'Checking cache…',
      'Install Playwright browsers': 'Installing Playwright…',
      'Install Playwright system deps only': 'Loading system deps…',
      'Run detection': 'Running detection…',
      'Run import': 'Running import…',
    };

    return new Promise((resolve) => {
      const interval = setInterval(async () => {
        attempts++;
        if (attempts > 72) { clearInterval(interval); setProgress(''); resolve('timeout'); return; }
        try {
          const jobsRes = await fetch(
            `https://api.github.com/repos/${GITHUB_ORG}/${GITHUB_REPO}/actions/runs/${runId}/jobs`,
            { headers: { Authorization: `Bearer ${token}`, Accept: 'application/vnd.github+json' } }
          );
          const jobsData = await jobsRes.json();
          const job = jobsData.jobs?.[0];
          if (!job) { setProgress('Queued…'); return; }
          if (job.status === 'completed') {
            clearInterval(interval);
            setProgress('');
            resolve(job.conclusion);
            return;
          }
          const activeStep = job.steps?.find(s => s.status === 'in_progress');
          const stepName = activeStep?.name || 'Running…';
          setProgress(friendly[stepName] || stepName + '…');
        } catch {}
      }, 5000);
    });
  }

  let isRunning = false;

  $('detect-btn').addEventListener('click', async () => {
    if (isRunning) return;
    isRunning = true;
    $('detect-btn').disabled = true;
    $('import-btn').disabled = true;
    setDot('pending');
    setProgress('Triggering…');
    try {
      const runId = await triggerWorkflow('detect.yml', null);
      if (!runId) throw new Error('Could not trigger detect');
      setProgress('Queued…');
      const conclusion = await pollRunProgress(runId);
      if (conclusion === 'success') {
        showCompleteBadge();
        await new Promise(r => setTimeout(r, 1500));
        await loadReport();
      } else {
        setProgress('');
        alert(`Detection ${conclusion || 'failed'}. Check GitHub Actions.`);
      }
    } catch (err) {
      setProgress('');
      alert('Could not trigger detection. Check your connection.');
    }
    isRunning = false;
    $('detect-btn').disabled = false;
  });

  $('import-btn').addEventListener('click', async () => {
    if (isRunning) return;
    const count = $('count-new').textContent;
    if (!confirm(`Import ${count} new ${count==='1'?'entry':'entries'} to Halsail?`)) return;
    isRunning = true;
    $('detect-btn').disabled = true;
    $('import-btn').disabled = true;
    setDot('pending');
    setProgress('Triggering…');
    try {
      const runId = await triggerWorkflow(null, 'run-import');
      if (!runId) throw new Error('Could not trigger import');
      setProgress('Queued…');
      const conclusion = await pollRunProgress(runId);
      if (conclusion === 'success') {
        showCompleteBadge();
        await new Promise(r => setTimeout(r, 1500));
        await loadReport();
      } else {
        setProgress('');
        alert(`Import ${conclusion || 'failed'}. Check GitHub Actions.`);
      }
    } catch (err) {
      setProgress('');
      alert('Could not trigger import. Check your connection.');
    }
    isRunning = false;
    $('detect-btn').disabled = false;
  });

  $('refresh-btn').addEventListener('click', () => { if (!isRunning) loadReport(); });

  checkAuth();
</script>
</body>
</html>
